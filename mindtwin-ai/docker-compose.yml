services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mindtwin_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    env_file:
      - .env.example

  auth-service:
    build: ./backend/auth-service
    ports:
      - "3001:3001"
    env_file:
      - .env.example
    environment:
      - PORT=3001

  profile-service:
    build: ./backend/profile-service
    ports:
      - "3002:3002"
    env_file:
      - .env.example
    environment:
      - PORT=3002

  scheduler-service:
    build: ./backend/scheduler-service
    ports:
      - "3003:3003"
    env_file:
      - .env.example
    environment:
      - PORT=3003

  quiz-service:
    build: ./backend/quiz-service
    ports:
      - "3004:3004"
    env_file:
      - .env.example
    environment:
      - PORT=3004

  stress-service:
    build: ./backend/stress-service
    ports:
      - "3005:3005"
    env_file:
      - .env.example
    environment:
      - PORT=3005

  reward-service:
    build: ./backend/reward-service
    ports:
      - "3006:3006"
    env_file:
      - .env.example
    environment:
      - PORT=3006

  notification-service:
    build: ./backend/notification-service
    ports:
      - "3007:3007"
    env_file:
      - .env.example
    environment:
      - PORT=3007
