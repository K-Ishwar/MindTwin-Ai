services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mindtwin_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - mindtwin-network

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    networks:
      - mindtwin-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - mindtwin-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/web/dist:/usr/share/nginx/html:ro
    networks:
      - mindtwin-network

  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    networks:
      - mindtwin-network

  auth-service:
    build: ./backend/auth-service
    ports:
      - "3001:3001"
    env_file:
      - .env.example
    environment:
      - PORT=3001
    networks:
      - mindtwin-network

  profile-service:
    build: ./backend/profile-service
    ports:
      - "3002:3002"
    env_file:
      - .env.example
    environment:
      - PORT=3002
    networks:
      - mindtwin-network

  scheduler-service:
    build: ./backend/scheduler-service
    ports:
      - "3003:3003"
    env_file:
      - .env.example
    environment:
      - PORT=3003
    networks:
      - mindtwin-network

  quiz-service:
    build: ./backend/quiz-service
    ports:
      - "3004:3004"
    env_file:
      - .env.example
    environment:
      - PORT=3004
    networks:
      - mindtwin-network

  stress-service:
    build: ./backend/stress-service
    ports:
      - "3005:3005"
    env_file:
      - .env.example
    environment:
      - PORT=3005
    networks:
      - mindtwin-network

  reward-service:
    build: ./backend/reward-service
    ports:
      - "3006:3006"
    env_file:
      - .env.example
    environment:
      - PORT=3006
    networks:
      - mindtwin-network

  notification-service:
    build: ./backend/notification-service
    ports:
      - "3007:3007"
    env_file:
      - .env.example
    environment:
      - PORT=3007
    networks:
      - mindtwin-network

networks:
  mindtwin-network:
    driver: bridge
