events {}
http {
    server {
        listen 80;

        # ── Health check (Docker NGINX itself) ────────────────────────────────
        location = /health {
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── Backend service routing ───────────────────────────────────────────
        location /api/auth/         { proxy_pass http://auth-service:3001/api/auth/;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/profile/      { proxy_pass http://profile-service:3002/api/profile/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/scheduler/    { proxy_pass http://scheduler-service:3003/api/scheduler/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/quiz/         { proxy_pass http://quiz-service:3004/api/quiz/;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/stress/       { proxy_pass http://stress-service:3005/api/stress/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/reward/       { proxy_pass http://reward-service:3006/api/reward/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/notification/ { proxy_pass http://notification-service:3007/api/notifications/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/analytics/    { proxy_pass http://analytics-service:3008/api/analytics/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
        location /api/ai/           { proxy_pass http://ai-engine:8000/;                     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    }
}
