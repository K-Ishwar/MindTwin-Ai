# ─────────────────────────────────────────────────────────────────────────────
# MindTwin AI — Host-level NGINX configuration
# Runs directly on the EC2 instance (NOT inside Docker).
# Handles SSL termination via Let's Encrypt, then proxies to Docker NGINX
# which handles internal service routing on port 8080.
#
# Install: sudo cp nginx-host.conf /etc/nginx/sites-available/mindtwin
#          sudo ln -s /etc/nginx/sites-available/mindtwin /etc/nginx/sites-enabled/mindtwin
#          sudo nginx -t && sudo systemctl reload nginx
#
# SSL:     sudo certbot --nginx -d mindtwin.ai -d api.mindtwin.ai -d app.mindtwin.ai
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect all HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mindtwin.ai www.mindtwin.ai api.mindtwin.ai app.mindtwin.ai;

    # Let's Encrypt ACME challenge (must stay on HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main app + API (mindtwin.ai, api.mindtwin.ai) ─────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mindtwin.ai www.mindtwin.ai api.mindtwin.ai;

    # ── SSL (managed by Certbot — do not edit these lines manually) ───────────
    ssl_certificate     /etc/letsencrypt/live/mindtwin.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mindtwin.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.mindtwin.ai wss://api.mindtwin.ai; frame-ancestors 'none';" always;

    # ── Rate limiting (defined in nginx.conf http block) ──────────────────────
    # limit_req zone=api burst=20 nodelay;

    # ── Proxy to Docker NGINX (port 8080 inside Docker) ───────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Health check endpoint (bypasses rate limiting) ────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        access_log off;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|sql|bak|log)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mindtwin-access.log;
    error_log  /var/log/nginx/mindtwin-error.log warn;
}

