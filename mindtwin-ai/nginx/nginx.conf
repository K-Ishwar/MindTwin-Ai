worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # Per-IP limit for unauthenticated / auth endpoints (brute-force protection)
    limit_req_zone $binary_remote_addr zone=api_per_ip:10m  rate=100r/m;
    # Per-token limit for authenticated API calls (fair-use per user)
    limit_req_zone $http_authorization zone=api_per_token:10m rate=60r/m;
    # Strict limit on auth endpoints to prevent credential stuffing
    limit_req_zone $binary_remote_addr zone=auth:10m         rate=10r/m;

    map $http_origin $cors_origin {
        default "";
        "~^http://localhost:3000$"  $http_origin;
        "~^http://localhost:5173$"  $http_origin;
        "~^http://localhost:5174$"  $http_origin;
        "~^http://localhost:19000$" $http_origin;
        "~^https://mindtwin\.app$"  $http_origin;
    }

    server {
        listen 80;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # CORS Headers
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With" always;

        # Preflight response
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Proxy settings
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Health Check
        location = /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ── Auth endpoints — strict rate limit (brute-force protection) ───────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://auth-service:3001;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
        }

        # ── All other API endpoints — per-token + per-IP limits ───────────────
        location /api/profile/ {
            limit_req zone=api_per_token burst=20 nodelay;
            proxy_pass http://profile-service:3002;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
        }
        location /api/scheduler/ {
            limit_req zone=api_per_token burst=20 nodelay;
            proxy_pass http://scheduler-service:3003;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }
        location /api/quiz/ {
            limit_req zone=api_per_token burst=20 nodelay;
            proxy_pass http://quiz-service:3004;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }
        location /api/stress/ {
            limit_req zone=api_per_token burst=20 nodelay;
            proxy_pass http://stress-service:3005;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }
        location /api/reward/ {
            limit_req zone=api_per_token burst=20 nodelay;
            proxy_pass http://reward-service:3006;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }
        location /api/notifications/ {
            limit_req zone=api_per_token burst=20 nodelay;
            proxy_pass http://notification-service:3007;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }
        location /api/analytics/ {
            limit_req zone=api_per_token burst=20 nodelay;
            proxy_pass http://analytics-service:3008;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
        }
        location /api/ai/ {
            limit_req zone=api_per_ip burst=30 nodelay;
            proxy_pass http://ai-engine:8000;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }

        # Web Frontend Route (Static Files)
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}
